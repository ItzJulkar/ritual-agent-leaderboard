<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ritual Agent Search — Type, Deploy Time &amp; Rank</title>
  <meta name="description" content="Search any Ritual testnet agent by address. See its type, exact deployment time, and rank." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>⚡ Ritual Agent Search</h1>
      <p class="subtitle">Search any agent on Ritual testnet — see its type, deployment time, and rank.</p>
    </header>

    <div class="search-section">
      <div class="search-row">
        <input type="text" id="searchInput" class="search-input" placeholder="Paste an agent address (0x…)" autocomplete="off" spellcheck="false" />
        <button id="searchBtn" class="search-btn">Search</button>
      </div>
      <div class="search-hint" id="searchHint">Try your agent address. First load builds a rank index (~20s, cached after).</div>
    </div>

    <div class="status-bar" id="statusBar" hidden>
      <div class="status-track"><div class="status-fill" id="statusFill"></div></div>
      <span class="status-text" id="statusText"></span>
    </div>

    <div class="result" id="result"></div>

    <div class="rank-status" id="rankStatus" hidden></div>
  </div>

  <footer class="footer">
    <span>Data from <a href="https://explorer.ritualfoundation.org" target="_blank" rel="noopener">Ritual Explorer</a> + on-chain RPC. Unofficial, testnet only.</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
